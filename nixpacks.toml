[phases.setup]
# Pin nixpkgs to stable 25.05 release — prevents GitHub 504 timeouts on unstable/master refs
nixPkgsArchive = 'https://github.com/NixOS/nixpkgs/archive/refs/tags/25.05.tar.gz'

[phases.install]
# Force fresh install without cache to ensure puppeteer-core is used (not cached puppeteer)
cmds = ["rm -rf node_modules", "npm install --omit=dev", "cd frontend && rm -rf node_modules && npm install --legacy-peer-deps"]

[phases.build]
cmds = ["cd frontend && CI=false npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_VERSION = "22"
