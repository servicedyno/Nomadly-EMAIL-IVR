[phases.setup]
# Pin nixpkgs to stable 25.05 release — prevents GitHub 504 timeouts on unstable/master refs
nixPkgsArchive = 'https://github.com/NixOS/nixpkgs/archive/refs/tags/25.05.tar.gz'

[phases.install]
cmds = ["npm install --omit=dev", "cd frontend && npm install --legacy-peer-deps"]

[phases.build]
cmds = ["cd frontend && CI=false npm run build"]

[start]
cmd = "npm start"

[variables]
NODE_VERSION = "22"
